imageName: ghcr.io/cloudnative-pg/postgresql:17.5
type: postgres
instances: 2
version: 16 # major version, only needed for timescaledb, ignored for postgres

initdb:
  database: "" # defaults to release name
  owner: app
  secret:
    name: cnpg-app-user
  postInitSQL: []
  # Runs in default "postgres" database after cluster initialization
  # Example of postInitSQL:
  # postInitSQL:
  #   - "CREATE ROLE app WITH LOGIN PASSWORD 'password';"
  postInitApplicationSQL: []
  # Runs in app database only (database specified in initdb.database) after postInitSQL
  # Example of postInitApplicationSQL:
  # postInitApplicationSQL:
  #   - "CREATE TABLE IF NOT EXISTS demo (id INT PRIMARY KEY);"

enableSuperuserAccess: false
superuserSecret:
  name: cnpg-superuser

storageClass: local-path
storage:
  size: 5Gi

backup:
  enabled: false
  destinationPath: ""
  endpointURL: ""
  secret:
    name: ""
  schedule: "0 0 0 * * *" # daily at midnight
  retentionPolicy: "30d"

affinity:
  enablePodAntiAffinity: false
  topologyKey: kubernetes.io/hostname

monitoring:
  enablePodMonitor: true

# Connection pooler (PgBouncer)
pooler:
  enabled: false
  instances: 2
  type: rw  # rw (read-write) or ro (read-only)
  poolMode: session  # session, transaction, or statement
  parameters:
    max_client_conn: "1000"
    default_pool_size: "25"
