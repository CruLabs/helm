apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  imageName: {{ .Values.imageName }}
  instances: {{ .Values.instances }}

  bootstrap:
    initdb:
      database: {{ .Values.initdb.database | default .Release.Name }}
      owner: {{ .Values.initdb.owner }}
      secret:
        name: {{ .Values.initdb.secret.name }}
      {{- if .Values.initdb.postInitSQL }}
      postInitSQL:
        {{- .Values.initdb.postInitSQL | toYaml | nindent 6 }}
      {{- end }}
      {{- if .Values.initdb.postInitApplicationSQL }}
      postInitApplicationSQL:
        {{- .Values.initdb.postInitApplicationSQL | toYaml | nindent 6 }}
      {{- end }}

  enableSuperuserAccess: {{ .Values.enableSuperuserAccess }}
  superuserSecret:
    name: {{ .Values.superuserSecret.name }}

  storage:
    storageClass: {{ .Values.storageClass }}
    size: {{ .Values.storage.size }}

{{- if .Values.backup.enabled }}
{{- $obc := printf "%s-backups" .Release.Name }}
{{- $bucketConfig := (lookup "v1" "ConfigMap" .Release.Namespace $obc) }}
{{- $bucketName := .Values.backup.destinationPath | default "" }}
{{- $bucketHost := .Values.backup.endpointURL | default "" }}
{{- if $bucketConfig.data }}
{{- $bucketName = printf "s3://%s/" (get $bucketConfig.data "BUCKET_NAME") }}
{{- $bucketHost = printf "http://%s:%s" (get $bucketConfig.data "BUCKET_HOST") (get $bucketConfig.data "BUCKET_PORT") }}
{{- end }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath | default $bucketName }}
      endpointURL: {{ .Values.backup.endpointURL | default $bucketHost }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.backup.secret.name | default ( printf "%s-backups" .Release.Name ) }}
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.backup.secret.name | default ( printf "%s-backups" .Release.Name ) }}
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
        jobs: 2
    retentionPolicy: {{ .Values.backup.retentionPolicy }}
{{- end }}

  affinity:
    enablePodAntiAffinity: {{ .Values.affinity.enablePodAntiAffinity }}
    topologyKey: {{ .Values.affinity.topologyKey }}

  monitoring:
    enablePodMonitor: {{ .Values.monitoring.enablePodMonitor }}