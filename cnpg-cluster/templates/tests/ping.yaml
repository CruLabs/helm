apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-ping-test
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: database-ping-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: {{ .Release.Name }}-ping-test
      labels:
        app.kubernetes.io/component: database-ping-test
    spec:
      restartPolicy: Never
      containers:
        - name: alpine
          image: alpine:3.17
          command: [ 'sh' ]
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.initdb.secret.name }}
                  key: username
            - name: PGPASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.initdb.secret.name }}
                  key: password
            - name: PGDBNAME
              value: {{ .Values.initdb.database | default .Release.Name }}
          args:
            - "-c"
            - >-
              apk add postgresql-client &&
              psql "postgresql://$PGUSER:$PGPASS@{{ .Release.Name }}-rw.{{ .Release.Namespace }}.svc.cluster.local:5432/${PGDBNAME:-$PGUSER}" -c 'SELECT 1'
