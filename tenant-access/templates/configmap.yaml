---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-users-config
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  users: |
    {{- range .Values.users }}
    {{ .name }}
    {{- end }}
  namespace: {{ .Values.namespace | quote }}
 