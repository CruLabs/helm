{{ range .Values.teams }}
{{ $team := . }}
{{ range .namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $team.name }}-binding
  namespace: {{ . }}
  labels:
    toolkit.fluxcd.io/tenant: {{ $team.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  {{- range $.Values.users }}
  {{- if has $team.name .teams }}
  - kind: ServiceAccount
    name: {{ .name }}
    namespace: {{ $.Release.Namespace }}
  {{- end }}
  {{- end }}
{{ end }}
{{ end }}